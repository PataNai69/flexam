<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foreign Language — CLO-2 & CLO-3 MCQs</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;padding:20px;color:#1a1a1a}
.wrap{max-width:880px;margin:0 auto}
.hdr{background:linear-gradient(135deg,#b71c1c,#c62828);color:#fff;border-radius:12px;padding:20px 24px;margin-bottom:18px}
.hdr h1{font-size:21px;font-weight:700;margin-bottom:4px}
.hdr p{font-size:13px;opacity:.85}
#pginfo{font-size:13px;opacity:.85;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:#fff;border-radius:10px;border:1px solid #e0e0e0;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.sv{font-size:26px;font-weight:700;color:#1a1a1a}
.sl{font-size:12px;color:#888;margin-top:3px}
.pbar{height:6px;background:#e0e0e0;border-radius:3px;margin-bottom:14px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#b71c1c,#ef9a9a);border-radius:3px;transition:width .3s}
.ctls{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.btn{background:#fff;border:1px solid #ccc;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;color:#333;font-weight:500;transition:background .15s}
.btn:hover{background:#f0f0f0}
.btn.pri{background:#b71c1c;color:#fff;border-color:#b71c1c}
.btn.pri:hover{background:#c62828}
.btn.prep{background:#fff3e0;color:#e65100;border-color:#ffb74d}
.btn.prep:hover{background:#ffe0b2}
.btn.prep.active{background:#e65100;color:#fff;border-color:#e65100}
.btn.qzm{background:#f3e5f5;color:#6a1b9a;border-color:#ce93d8}
.btn.qzm:hover{background:#e1bee7}
.btn.qzm.active{background:#6a1b9a;color:#fff;border-color:#6a1b9a}
.tab-btns{display:flex;gap:0;margin-bottom:18px;border-radius:10px;overflow:hidden;border:1.5px solid #ffcdd2}
.tab-btn{flex:1;padding:11px 8px;font-size:14px;font-weight:600;cursor:pointer;border:none;background:#ffebee;color:#c62828;transition:background .15s}
.tab-btn:not(:last-child){border-right:1.5px solid #ffcdd2}
.tab-btn.active{background:#b71c1c;color:#fff}
.sec-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
.sec-clo2{background:#e3f2fd;color:#1565c0}
.sec-clo3{background:#fce4ec;color:#c62828}
.sticky-top{position:sticky;top:0;z-index:100;background:#f0f2f5;padding-bottom:10px}
.qcard{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:18px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.qnum{font-size:11px;font-weight:700;color:#b71c1c;margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase}
.qtxt{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:13px;line-height:1.55}
.opts{display:flex;flex-direction:column;gap:7px}
.opt{background:#fafafa;border:1.5px solid #e0e0e0;border-radius:8px;padding:10px 14px;font-size:13px;color:#333;cursor:pointer;text-align:left;display:flex;align-items:flex-start;gap:10px;transition:background .12s,border-color .12s;line-height:1.4}
.opt:hover:not(:disabled){background:#ffebee;border-color:#ef9a9a}
.ok{font-weight:700;color:#b71c1c;min-width:22px;flex-shrink:0}
.opt.shwc{background:#e8f5e9;border-color:#4caf50;color:#1b5e20}
.opt.shwc .ok{color:#2e7d32}
.opt.wrng{background:#ffebee;border-color:#ef5350;color:#b71c1c}
.opt.wrng .ok{color:#c62828}
.opt.prep-corr{background:#e8f5e9;border-color:#4caf50;color:#1b5e20;font-weight:700}
.opt.prep-corr .ok{color:#2e7d32}
.fb{margin-top:10px;font-size:13px;padding:8px 12px;border-radius:8px;font-weight:500}
.fb.ok{background:#e8f5e9;color:#1b5e20;border-left:4px solid #4caf50}
.fb.no{background:#ffebee;color:#b71c1c;border-left:4px solid #ef5350}
.quiz-opt-btn{padding:10px 14px;border-radius:8px;border:1.5px solid #e0e0e0;background:#fafafa;color:#333;font-size:13px;cursor:pointer;transition:background .12s,border-color .12s;text-align:left;width:100%;display:block;line-height:1.4;margin-bottom:7px}
.quiz-opt-btn:hover:not(:disabled){background:#ffebee;border-color:#ef9a9a}
.quiz-opt-btn.result-corr{background:#e8f5e9;color:#1b5e20;border-color:#4caf50}
.quiz-opt-btn.result-wrng{background:#ffebee;color:#b71c1c;border-color:#ef5350}
.mode-banner{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.mode-banner.prep{background:#fff3e0;color:#e65100;border:1.5px solid #ffb74d}
.mode-banner.quiz{background:#f3e5f5;color:#6a1b9a;border:1.5px solid #ce93d8}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <h1>Foreign Language (Chinese) — CLO-2 &amp; CLO-3</h1>
  <p>Vocabulary · Grammar · Tones · Days &amp; Time · Sentence Types · Pronouns</p>
  <div id="pginfo">Total Questions: 80</div>
</div>
<div class="sticky-top">
  <div class="stats">
    <div class="stat"><div class="sv" id="stot">80</div><div class="sl">Total Questions</div></div>
    <div class="stat"><div class="sv" id="scor" style="color:#2e7d32">0</div><div class="sl">✓ Correct</div></div>
    <div class="stat"><div class="sv" id="swrg" style="color:#c62828">0</div><div class="sl">✗ Wrong</div></div>
  </div>
  <div class="pbar"><div class="pfill" id="prog" style="width:0%"></div></div>
  <div class="ctls">
    <button class="btn pri" onclick="resetAll()">↺ Restart</button>
    <button class="btn prep" id="prepBtn" onclick="togglePrep()">📖 Preparation Mode</button>
    <button class="btn qzm" id="qzmBtn" onclick="toggleQuiz()">✏️ Quiz Mode</button>
  </div>
  <div id="modeBanner"></div>
</div>

<div class="tab-btns">
  <button class="tab-btn active" id="tab-all" onclick="setTab('all')">📋 All Questions (80)</button>
  <button class="tab-btn" id="tab-clo2" onclick="setTab('clo2')">🔵 CLO-2 (40)</button>
  <button class="tab-btn" id="tab-clo3" onclick="setTab('clo3')">🔴 CLO-3 (40)</button>
</div>

<div id="qa"></div>
</div>

<script>
const K=['A','B','C','D','E'];
let answered,corr,wrng;
let prepMode=true;
let quizMode=false;
let quizSelections={};
let quizChecked={};
let activeTab='all';

const clo2=[{s:"CLO-2",q:"\"Bird\" in Chinese is:",o:["Yú", "Mǎ", "Tùzi", "Niǎo"],a:3},
{s:"CLO-2",q:"\"Horse\" in Chinese is:",o:["Yáng", "Niú", "Zhū", "Mǎ"],a:3},

{s:"CLO-2",q:"\"W\u01d2 y\u011b h\u011bn h\u01ceo, Xi\u00e8xie!\" means:",o:["I am not fine, sorry", "How are you?", "I am fine too, thanks!", "You are very good"],a:2},
{s:"CLO-2",q:"\"N\u00edn ne?\" after greeting means:",o:["Goodbye", "And you? / What about you?", "Thank you", "Hello"],a:1},
{s:"CLO-2",q:"\"W\u01d2 b\u00f9 h\u01ceo\" means:",o:["I am fine", "How are you?", "I am not fine", "Thank you"],a:2},

{s:"CLO-2",q:"\"Ji\u0101\" means:",o:["Father", "Mother", "Elder Brother", "Home"],a:3},
{s:"CLO-2",q:"\"Z\u01ceo\" means:",o:["Night", "Middle", "Early / Morning", "Up"],a:2},
{s:"CLO-2",q:"\"W\u01cen\" means:",o:["Early", "Good", "Night / Late", "Down"],a:2},
{s:"CLO-2",q:"\"Sh\u00e0ng\" means:",o:["Down", "Middle", "Night", "Up / Above"],a:3},

{s:"CLO-2",q:"Tonal changes apply to:",o:["Writing only", "Speaking and Listening only", "Reading only", "Writing and Reading"],a:1},
{s:"CLO-2",q:"If more than 3 words share 3rd tone, method (a) says:",o:["Change all words to 4th tone", "Change all starting words to 2nd tone, last stays same", "Change only the middle words", "Change only the first word"],a:1},
{s:"CLO-2",q:"\"R\u00e8n shi\" means:",o:["To go", "To look at", "To like", "To recognize"],a:3},
{s:"CLO-2",q:"\"K\u00e0n\" means:",o:["To go", "To like", "To look at", "To be called"],a:2},

{s:"CLO-2",q:"\"G\u0101ox\u00ecng\" means:",o:["Sad", "Angry", "Happy / Cheerful", "Tall"],a:2},
{s:"CLO-2",q:"\"D\u014du\" means:",o:["Happy", "Very", "Small", "All / Both"],a:3},
{s:"CLO-2",q:"\"Ch\u00e1ng\" means:",o:["Small", "Big", "Good", "Tall / Long / Often"],a:3},
{s:"CLO-2",q:"\"Xi\u01ceo\" means:",o:["Big", "Tall", "Good", "Small / Young"],a:3},
{s:"CLO-2",q:"\"N\u01d0 b\u00edzi ch\u00e1ng\" means:",o:["Your nose is small", "Your ears are long", "Your hair is long", "Your nose is long"],a:3},
{s:"CLO-2",q:"\"B\u00edzi\" in lesson 24 example sentence \"T\u0101 b\u00edzi ch\u00e1ng\" means:",o:["His hand is big", "His height is tall", "His nose is long", "His ear is big"],a:2},
{s:"CLO-2",q:"\"G\u00e8zi\" in Chinese means:",o:["Ear", "Nose", "Hair", "Height / Stature"],a:3},
{s:"CLO-2",q:"Which one is a drink?",o:["Māo", "Zhū", "Miàntiáo", "Kāfēi"],a:3},
{s:"CLO-2",q:"\"W\u01d2 \u00e0i ch\u012b m\u01d0f\u00e0n\" means:",o:["I love drinking water", "I love eating noodles", "I am fond of eating rice", "I love my mother"],a:2},
{s:"CLO-2",q:"\"Xu\u00e9 xi\u00e0o\" means:",o:["Store", "Home", "Hospital", "School"],a:3},
{s:"CLO-2",q:"\"Sh\u0101ng di\u00e0n\" means:",o:["School", "Home", "Store / Shop", "Hospital"],a:2},
{s:"CLO-2",q:"Which word means \"Teacher\"?",o:["Wǒmen", "Zhōngguó rén", "Lǎoshī", "Jiě jie"],a:2},
{s:"CLO-2",q:"Which sentence shows Interrogation?",o:["Nǐ chī mǐfàn", "Nǐ bù chī mǐfàn", "Qǐng nǐ chī mǐfàn", "Nǐ chī mǐfàn ma?"],a:3},
{s:"CLO-2",q:"\"W\u01cen sh\u00e0ng li\u01ceng di\u01cen s\u0101n k\u00e8\" means:",o:["2:15 AM", "2:30 AM", "2:45 AM", "3:45 AM"],a:2},
{s:"CLO-2",q:"Which of the following is the correct Chinese date order?",o:["Day → Month → Year → Weekday", "Month → Day → Year", "Year → Month → Day → Weekday", "Weekday → Day → Month → Year"],a:2},
{s:"CLO-2",q:"The date pattern in Chinese for 2016-12-30 Sunday starts with:",o:["Sān shí hào", "Shí èr yuè", "Xīngqī tiān", "Èr líng yī liù"],a:3},
{s:"CLO-2",q:"\"Li\u01ceng g\u00e8 X\u012bngq\u012b\" means:",o:["Two months", "Two years", "Two hours", "Two weeks"],a:3},
{s:"CLO-2",q:"\"Li\u01ceng g\u00e8 Yu\u00e8\" means:",o:["Two years", "Two weeks", "Two months", "Two hours"],a:2},
{s:"CLO-2",q:"\"Li\u01ceng Di\u01cen\" means:",o:["2 minutes", "2 weeks", "2 o'clock", "2 seconds"],a:2},
{s:"CLO-2",q:"\"Sh\u00ed s\u00ec di\u01cen b\u00e0n\" means:",o:["14:00", "14:15", "14:45", "14:30"],a:3},
{s:"CLO-2",q:"\"De\" is used to show:",o:["Location", "Question", "Possession / belonging", "Negation"],a:2},
{s:"CLO-2",q:"\"Su\u00ec\" is a classifier used for:",o:["Crop harvest and length", "Age", "Time", "Weight"],a:1}];
const clo3=[{s:"CLO-3",q:"\"Week\" in Chinese is:",o:["Yuè", "Nián", "Tiān", "Xīngqī"],a:3},
{s:"CLO-3",q:"\"Sunday\" in Chinese is:",o:["Xīngqīyī", "Xīngqīsān", "Xīngqīwǔ", "Xīngqītiān"],a:3},
{s:"CLO-3",q:"\"Saturday\" in Chinese is:",o:["Xīngqīèr", "Xīngqīsì", "Xīngqīliù", "Xīngqīwǔ"],a:2},
{s:"CLO-3",q:"\"J\u012bnti\u0101n x\u012bngq\u012by\u012b\" means:",o:["Today is Tuesday", "Today is Friday", "Today is Sunday", "Today is Monday"],a:3},
{s:"CLO-3",q:"\"Month\" in Chinese is:",o:["Rì", "Nián", "Shí", "Yuè"],a:3},
{s:"CLO-3",q:"\"January\" in Chinese is:",o:["Èr yuè", "Sān yuè", "Liù yuè", "Yī yuè"],a:3},
{s:"CLO-3",q:"\"April\" in Chinese is:",o:["Shí yuè", "Liù yuè", "Yī yuè", "Sì yuè"],a:3},
{s:"CLO-3",q:"Number \"0\" in Chinese is:",o:["Yī", "Èr", "Sān", "Líng"],a:3},
{s:"CLO-3",q:"Number \"10\" in Chinese is:",o:["Bǎi", "Èr", "Wǔ", "Shí"],a:3},
{s:"CLO-3",q:"What does \"\u00c8rsh\u00ed\" mean?",o:["12", "22", "30", "20"],a:3},
{s:"CLO-3",q:"\"What time is it?\" in Chinese is:",o:["Nǐ jiào shénme?", "Nǐ hǎo ma?", "Nǐ qù nǎr?", "Xiànzài jǐ diǎn?"],a:3},
{s:"CLO-3",q:"\"Quarter\" in Chinese is:",o:["Bàn", "Miǎo", "Yuè", "Kè"],a:3},
{s:"CLO-3",q:"\"12:00 noon\" in Chinese is:",o:["Yī diǎn", "Liǎng diǎn", "Shí'èr diǎn", "Zhōngwǔ shí'èr diǎn"],a:3},
{s:"CLO-3",q:"\"Date\" in Chinese is:",o:["Xiànzài", "Nián", "Yuè", "Hào"],a:3},
{s:"CLO-3",q:"\"Ni\u00e1n\" means:",o:["Month", "Week", "Day", "Year"],a:3},
{s:"CLO-3",q:"\"X\u012bngq\u012b\" means:",o:["Year", "Month", "Day", "Week"],a:3},
{s:"CLO-3",q:"\"This week\" in Chinese is:",o:["Zhège yuè", "Xià ge yuè", "Jīntiān", "Zhège xīngqī"],a:3},
{s:"CLO-3",q:"\"J\u012bnti\u0101n\" means:",o:["Tomorrow", "Yesterday", "Now", "Today"],a:3},
{s:"CLO-3",q:"Interronegation combines:",o:["Question + Exclamation", "Question + Negative", "Negative + Imperative", "Optative + Exclamation"],a:1},
{s:"CLO-3",q:"Imperative sentence type is used for:",o:["Questions", "Wishes", "Emotions", "Request / Order"],a:3},
{s:"CLO-3",q:"Optative sentence is used for:",o:["Orders", "Questions", "Pray / Wish", "Emotions"],a:2},
{s:"CLO-3",q:"Exclamation sentence expresses:",o:["Request", "Wish", "Negation", "Emotion / Feeling"],a:3},
{s:"CLO-3",q:"\"T\u0101\" means:",o:["I", "You", "We", "He / She / It / things"],a:3},
{s:"CLO-3",q:"\"W\u01d2\" means:",o:["They", "You", "We", "I / Me"],a:3},
{s:"CLO-3",q:"\"T\u0101\" means:",o:["I", "You", "We", "He / She / It"],a:3},
{s:"CLO-3",q:"\"M\u01d0f\u00e0n\" means:",o:["Noodles", "Milk", "Apple", "Boiled/cooked rice"],a:3},
{s:"CLO-3",q:"\"Ni\u00fa n\u01cei\" means:",o:["Water", "Apple", "Rice", "Milk / Cow's milk"],a:3},
{s:"CLO-3",q:"\"Shu\u01d0\" means:",o:["Apple", "Milk", "Noodles", "Water"],a:3},
{s:"CLO-3",q:"\"\u00c0i\" means:",o:["No", "Big", "Love / Fond of", "Small"],a:2},
{s:"CLO-3",q:"\"B\u00f9\" means:",o:["Love", "Big", "Good", "No / Not"],a:3},
{s:"CLO-3",q:"\"Ch\u00e1ng\" means:",o:["Small", "Big", "Good", "Tall / Long / Often"],a:3},
{s:"CLO-3",q:"\"D\u014du\" means:",o:["Happy", "Very", "Small", "All / Both"],a:3},
{s:"CLO-3",q:"\"H\u01ceo\" (expression) means:",o:["Very", "No", "Love", "Good / Fine"],a:3},
{s:"CLO-3",q:"\"G\u0101ox\u00ecng\" means:",o:["Sad", "Angry", "Happy / Cheerful", "Tall"],a:2},
{s:"CLO-3",q:"\"G\u00e8zi\" in Chinese means:",o:["Ear", "Nose", "Hair", "Height / Stature"],a:3},
{s:"CLO-3",q:"\"N\u01d0 b\u00edzi ch\u00e1ng\" means:",o:["Your nose is small", "Your ears are long", "Your hair is long", "Your nose is long"],a:3},
{s:"CLO-3",q:"\"T\u0101 b\u00edzi ch\u00e1ng\" means:",o:["His hand is big", "His height is tall", "His nose is long", "His ear is big"],a:2},
{s:"CLO-3",q:"\"Sh\u0101ng di\u00e0n\" means:",o:["School", "Home", "Store / Shop", "Hospital"],a:2},
{s:"CLO-3",q:"\"L\u01ceosh\u012b\" means:",o:["Student", "Doctor", "Teacher", "Chinese person"],a:2},
{s:"CLO-3",q:"\"Zh\u014dnggu\u00f3 r\u00e9n\" means:",o:["Chinese language", "Chinese food", "Chinese school", "Chinese people"],a:3}];

function getActive(){
  if(activeTab==='clo2') return clo2;
  if(activeTab==='clo3') return clo3;
  return [...clo2,...clo3];
}

function setTab(t){
  activeTab=t;
  ['all','clo2','clo3'].forEach(id=>{
    document.getElementById('tab-'+id).className='tab-btn'+(t===id?' active':'');
  });
  init();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function init(){
  const raw=getActive();
  answered=raw.map(()=>null);
  corr=0;wrng=0;
  quizSelections={};quizChecked={};
  document.getElementById('stot').textContent=raw.length;
  document.getElementById('pginfo').textContent='Total Questions: '+raw.length;
}

function render(){
  const raw=getActive();
  let h='';
  raw.forEach((q,i)=>{
    const ans=answered[i];
    const badgeCls=q.s==='CLO-2'?'sec-badge sec-clo2':'sec-badge sec-clo3';
    h+=`<div class="qcard" id="qc${i}">`;
    h+=`<span class="${badgeCls}">${q.s}</span>`;
    h+=`<div class="qnum">Question ${i+1} / ${raw.length}</div>`;
    h+=`<div class="qtxt">${q.q}</div>`;
    h+='<div class="opts">';
    if(quizMode){
      const chk=quizChecked[i];
      const sel=quizSelections[i];
      q.o.forEach((o,j)=>{
        let cls='quiz-opt-btn';
        if(chk){if(j===q.a)cls+=' result-corr';else if(j===sel&&sel!==q.a)cls+=' result-wrng';}
        h+=`<button class="${cls}" onclick="quizMark(${i},${j})"${chk?' disabled':''}}>${K[j]}) ${o}</button>`;
      });
      h+='</div>';
      if(chk){const ok=quizSelections[i]===q.a;h+=ok?`<div class="fb ok">✓ Correct!</div>`:`<div class="fb no">✗ Wrong! Correct: ${K[q.a]}) ${q.o[q.a]}</div>`;}
    } else {
      q.o.forEach((o,j)=>{
        let c='opt';
        if(prepMode){if(j===q.a)c+=' prep-corr';}
        else{if(ans!==null){if(j===q.a)c+=' shwc';else if(j===ans&&ans!==q.a)c+=' wrng';}}
        const dis=(ans!==null||prepMode)?' disabled':'';
        h+=`<button class="${c}" onclick="pick(${i},${j})"${dis}><span class="ok">${K[j]})</span>${o}</button>`;
      });
      h+='</div>';
      if(!prepMode&&ans!==null){h+=ans===q.a?`<div class="fb ok">✓ Correct!</div>`:`<div class="fb no">✗ Wrong! Correct: ${K[q.a]}) ${q.o[q.a]}</div>`;}
    }
    h+='</div>';
  });
  document.getElementById('qa').innerHTML=h;
  document.getElementById('scor').textContent=corr;
  document.getElementById('swrg').textContent=wrng;
  const done=answered.filter(a=>a!==null).length;
  document.getElementById('prog').style.width=Math.round(done/raw.length*100)+'%';
}

function quizMark(i,j){
  if(quizChecked[i])return;
  const raw=getActive();
  quizChecked[i]=true;quizSelections[i]=j;
  const q=raw[i];const ok=(j===q.a);
  if(ok)corr++;else wrng++;
  document.getElementById('scor').textContent=corr;
  document.getElementById('swrg').textContent=wrng;
  document.getElementById('prog').style.width=Math.round(Object.keys(quizChecked).length/raw.length*100)+'%';
  const card=document.getElementById('qc'+i);
  card.querySelectorAll('.quiz-opt-btn').forEach((b,idx)=>{
    b.className='quiz-opt-btn';
    if(idx===q.a)b.classList.add('result-corr');
    else if(idx===j&&!ok)b.classList.add('result-wrng');
    b.disabled=true;
  });
  const fb=document.createElement('div');
  fb.className=ok?'fb ok':'fb no';
  fb.textContent=ok?'✓ Correct!':`✗ Wrong! Correct: ${K[q.a]}) ${q.o[q.a]}`;
  card.appendChild(fb);
}

function pick(i,j){
  if(answered[i]!==null)return;
  answered[i]=j;
  if(j===getActive()[i].a)corr++;else wrng++;
  render();
  document.getElementById('qc'+i).scrollIntoView({behavior:'smooth',block:'nearest'});
}

function togglePrep(){
  if(quizMode){quizMode=false;document.getElementById('qzmBtn').classList.remove('active');}
  prepMode=!prepMode;
  document.getElementById('prepBtn').classList.toggle('active',prepMode);
  document.getElementById('modeBanner').innerHTML=prepMode?'<div class="mode-banner prep">📖 Preparation Mode — All correct answers are highlighted</div>':'';
  render();
}

function toggleQuiz(){
  if(prepMode){prepMode=false;document.getElementById('prepBtn').classList.remove('active');}
  quizMode=!quizMode;
  document.getElementById('qzmBtn').classList.toggle('active',quizMode);
  document.getElementById('modeBanner').innerHTML=quizMode?'<div class="mode-banner quiz">✏️ Quiz Mode — Click an option to instantly see result</div>':'';
  render();
}

function resetAll(){
  init();
  if(prepMode)document.getElementById('modeBanner').innerHTML='<div class="mode-banner prep">📖 Preparation Mode — All correct answers are highlighted</div>';
  else if(quizMode)document.getElementById('modeBanner').innerHTML='<div class="mode-banner quiz">✏️ Quiz Mode — Click an option to instantly see result</div>';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

init();
document.getElementById('prepBtn').classList.add('active');
document.getElementById('modeBanner').innerHTML='<div class="mode-banner prep">📖 Preparation Mode — All correct answers are highlighted</div>';
render();
</script>
</body>
</html>
